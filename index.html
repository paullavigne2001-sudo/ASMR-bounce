<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMR Bounce</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: rgba(255,255,255,0.04);
    --accent: #c8a96e;
    --text: #e8e0d0;
    --muted: rgba(232,224,208,0.35);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    user-select: none;
  }

  #canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
  }

  #ui {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid rgba(200,169,110,0.18);
    border-radius: 60px;
    padding: 10px 24px;
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .btn {
    background: none;
    border: 1px solid rgba(200,169,110,0.4);
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.12em;
    padding: 6px 18px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }
  .btn:hover { background: rgba(200,169,110,0.12); border-color: var(--accent); }
  .btn.active { background: rgba(200,169,110,0.18); border-color: var(--accent); }

  #title {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }

  #start-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 20;
    background: var(--bg);
    transition: opacity 0.8s;
  }
  #start-overlay h1 {
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.2em;
    color: var(--accent);
  }
  #start-overlay p {
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #start-btn {
    margin-top: 12px;
    padding: 14px 48px;
    font-size: 14px;
    letter-spacing: 0.25em;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="start-overlay">
  <h1>ASMR Bounce</h1>
  <p>Sons & trajectoires</p>
  <button class="btn" id="start-btn">Commencer</button>
</div>

<div id="title">ASMR Bounce</div>
<canvas id="canvas"></canvas>

<div id="ui">
  <button class="btn" id="btn-add">+ Balle</button>
  <button class="btn active" id="btn-trails">Traînées</button>
  <button class="btn" id="btn-ripples">Impacts</button>
  <button class="btn" id="btn-reset">Reset</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Audio ───────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// Pentatonic scale + harmonics for ASMR feel
const NOTES = [
  261.63, 293.66, 329.63, 392.00, 440.00, // C4 D4 E4 G4 A4
  523.25, 587.33, 659.25, 783.99, 880.00, // C5 D5 E5 G5 A5
  196.00, 220.00, 246.94,                  // G3 A3 B3
];

function playNote(freq, type = 'sine', vol = 0.18) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2200, t);
  filter.Q.setValueAtTime(1.5, t);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.998, t + 0.4);

  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

  // Shimmer overtone
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.01, t);
  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(vol * 0.25, t + 0.02);
  gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  osc2.start(t); osc2.stop(t + 0.8);

  osc.start(t); osc.stop(t + 1.2);
}

// ─── Obstacles ───────────────────────────────────────
const OBSTACLE_TYPES = ['circle', 'rect', 'triangle', 'diamond'];

function makeObstacle() {
  const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  const noteIdx = Math.floor(Math.random() * NOTES.length);
  const hue = Math.random() * 360;
  return {
    x: 80 + Math.random() * (W - 160),
    y: 80 + Math.random() * (H - 220),
    r: 18 + Math.random() * 22,
    type,
    noteIdx,
    hue,
    glow: 0,
    pulsePhase: Math.random() * Math.PI * 2,
  };
}

let obstacles = [];
function buildObstacles() {
  obstacles = [];
  const n = Math.floor(6 + Math.random() * 5);
  for (let i = 0; i < n; i++) obstacles.push(makeObstacle());
}
buildObstacles();

// ─── Balls ────────────────────────────────────────────
const BALL_COLORS = [
  { h: 45,  s: 75, l: 65 },
  { h: 190, s: 70, l: 65 },
  { h: 280, s: 60, l: 70 },
  { h: 340, s: 65, l: 68 },
  { h: 130, s: 55, l: 62 },
];

function makeBall(idx = 0) {
  const speed = 2.2 + Math.random() * 2.2;
  const angle = Math.random() * Math.PI * 2;
  const col = BALL_COLORS[idx % BALL_COLORS.length];
  return {
    x: W * 0.3 + Math.random() * W * 0.4,
    y: H * 0.3 + Math.random() * H * 0.4,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 11 + Math.random() * 5,
    col,
    trail: [],
    trailMax: 90,
    glow: 0,
  };
}

let balls = [makeBall(0)];

// ─── Particles & Ripples ──────────────────────────────
let particles = [];
let ripples = [];

function spawnImpact(x, y, hue) {
  // Ripple
  ripples.push({ x, y, r: 4, maxR: 55 + Math.random() * 30, alpha: 0.7, hue });
  // Particles
  const n = 6 + Math.floor(Math.random() * 5);
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + Math.random() * 0.5;
    const sp = 1.2 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      decay: 0.03 + Math.random() * 0.03,
      r: 1.5 + Math.random() * 2.5,
      hue,
    });
  }
}

// ─── Collision helpers ────────────────────────────────
function circleCircle(bx, by, br, ox, oy, or_) {
  const dx = bx - ox, dy = by - oy;
  return Math.sqrt(dx*dx + dy*dy) < br + or_;
}
function circleRect(bx, by, br, ox, oy, or_) {
  const hw = or_ * 1.1, hh = or_ * 0.7;
  const cx = Math.max(ox - hw, Math.min(bx, ox + hw));
  const cy = Math.max(oy - hh, Math.min(by, oy + hh));
  const dx = bx - cx, dy = by - cy;
  return dx*dx + dy*dy < br * br;
}
function circleTri(bx, by, br, ox, oy, or_) {
  const dx = bx - ox, dy = by - oy;
  return Math.sqrt(dx*dx + dy*dy) < br + or_ * 0.85;
}
function circleDiamond(bx, by, br, ox, oy, or_) {
  const dx = Math.abs(bx - ox), dy = Math.abs(by - oy);
  return (dx + dy) < (or_ + br) * 1.0;
}

function testHit(ball, obs) {
  switch (obs.type) {
    case 'circle':   return circleCircle(ball.x, ball.y, ball.r, obs.x, obs.y, obs.r);
    case 'rect':     return circleRect(ball.x, ball.y, ball.r, obs.x, obs.y, obs.r);
    case 'triangle': return circleTri(ball.x, ball.y, ball.r, obs.x, obs.y, obs.r);
    case 'diamond':  return circleDiamond(ball.x, ball.y, ball.r, obs.x, obs.y, obs.r);
  }
}

function reflect(ball, obs) {
  const dx = ball.x - obs.x, dy = ball.y - obs.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const nx = dx / dist, ny = dy / dist;

  // Only reflect if moving toward obstacle — avoids double-hits
  const dot = ball.vx * nx + ball.vy * ny;
  if (dot >= 0) return;

  // Preserve exact speed — pure elastic reflection, no energy added
  const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  ball.vx -= 2 * dot * nx;
  ball.vy -= 2 * dot * ny;
  const newSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (newSpeed > 0) {
    ball.vx = (ball.vx / newSpeed) * speed;
    ball.vy = (ball.vy / newSpeed) * speed;
  }

  // Nudge just enough to exit overlap, nothing more
  const overlap = (ball.r + obs.r * 0.72) - dist;
  if (overlap > 0) {
    ball.x += nx * (overlap + 0.5);
    ball.y += ny * (overlap + 0.5);
  }
}

// ─── State flags ──────────────────────────────────────
let showTrails = true;
let showRipples = false;

// ─── Draw helpers ─────────────────────────────────────
function drawObstacle(o) {
  const glow = o.glow;
  const pulse = 1 + 0.06 * Math.sin(o.pulsePhase + Date.now() * 0.002);
  const r = o.r * pulse;
  const alpha = 0.55 + 0.35 * glow;
  ctx.save();
  ctx.translate(o.x, o.y);

  if (glow > 0) {
    ctx.shadowBlur = 28 * glow;
    ctx.shadowColor = `hsla(${o.hue},80%,65%,${glow})`;
  }

  ctx.strokeStyle = `hsla(${o.hue},70%,65%,${alpha})`;
  ctx.lineWidth = 1.5;
  ctx.fillStyle = `hsla(${o.hue},60%,40%,${0.12 + 0.15 * glow})`;

  ctx.beginPath();
  if (o.type === 'circle') {
    ctx.arc(0, 0, r, 0, Math.PI * 2);
  } else if (o.type === 'rect') {
    const hw = r * 1.1, hh = r * 0.7;
    ctx.roundRect(-hw, -hh, hw*2, hh*2, 5);
  } else if (o.type === 'triangle') {
    ctx.moveTo(0, -r);
    ctx.lineTo(r * 0.87, r * 0.5);
    ctx.lineTo(-r * 0.87, r * 0.5);
    ctx.closePath();
  } else if (o.type === 'diamond') {
    ctx.moveTo(0, -r);
    ctx.lineTo(r * 0.65, 0);
    ctx.lineTo(0, r);
    ctx.lineTo(-r * 0.65, 0);
    ctx.closePath();
  }
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawBall(b) {
  // Trail — smooth ribbon with quadratic curve
  if (showTrails && b.trail.length > 3) {
    ctx.save();
    ctx.lineWidth = b.r * 1.1;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const pts = b.trail;
    const n = pts.length;
    for (let i = 2; i < n; i++) {
      const t = i / n;
      const alpha = t * t * t * 0.38;
      const width = b.r * 1.1 * t;
      ctx.beginPath();
      ctx.moveTo(pts[i-1].x, pts[i-1].y);
      ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = `hsla(${b.col.h},${b.col.s}%,${b.col.l}%,${alpha})`;
      ctx.lineWidth = width;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Ball
  ctx.save();
  ctx.shadowBlur = 18 + 12 * b.glow;
  ctx.shadowColor = `hsla(${b.col.h},${b.col.s}%,${b.col.l}%,0.9)`;

  const grad = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, 0, b.x, b.y, b.r);
  grad.addColorStop(0, `hsla(${b.col.h},${b.col.s}%,${b.col.l + 15}%,1)`);
  grad.addColorStop(1, `hsla(${b.col.h},${b.col.s}%,${b.col.l - 10}%,0.9)`);

  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawRipples() {
  for (const rp of ripples) {
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${rp.hue},70%,65%,${rp.alpha})`;
    ctx.lineWidth = 1.5 * rp.alpha;
    ctx.stroke();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},75%,68%,${p.life * 0.85})`;
    ctx.fill();
  }
}

// ─── Main loop ────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  // Background fade
  ctx.fillStyle = 'rgba(10,10,15,0.28)';
  ctx.fillRect(0, 0, W, H);

  // Update obstacles pulse
  for (const o of obstacles) {
    o.pulsePhase += 0.018;
    o.glow *= 0.88;
  }

  // Update balls
  for (const b of balls) {
    b.glow *= 0.88;

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Walls
    if (b.x - b.r < 0)  { b.x = b.r;  b.vx = Math.abs(b.vx); triggerWall(b); }
    if (b.x + b.r > W)  { b.x = W - b.r; b.vx = -Math.abs(b.vx); triggerWall(b); }
    if (b.y - b.r < 0)  { b.y = b.r;  b.vy = Math.abs(b.vy); triggerWall(b); }
    if (b.y + b.r > H)  { b.y = H - b.r; b.vy = -Math.abs(b.vy); triggerWall(b); }

    // Obstacles
    for (const o of obstacles) {
      if (testHit(b, o)) {
        reflect(b, o);
        triggerHit(b, o);
      }
    }

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > b.trailMax) b.trail.shift();
  }

  // Update ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += 1.8;
    rp.alpha -= 0.018;
    if (rp.alpha <= 0) ripples.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Draw
  for (const o of obstacles) drawObstacle(o);
  if (showRipples) drawRipples();
  drawParticles();
  for (const b of balls) drawBall(b);
}

let wallCooldown = {};
function triggerWall(b) {
  const key = balls.indexOf(b) + '_wall';
  const now = Date.now();
  if (wallCooldown[key] && now - wallCooldown[key] < 80) return;
  wallCooldown[key] = now;
  b.glow = 1;
  const noteIdx = Math.floor(Math.random() * NOTES.length);
  playNote(NOTES[noteIdx], 'sine', 0.10);
  if (showRipples) spawnImpact(b.x, b.y, b.col.h);
}

let obsCooldown = {};
function triggerHit(b, o) {
  const key = obstacles.indexOf(o) + '_' + balls.indexOf(b);
  const now = Date.now();
  if (obsCooldown[key] && now - obsCooldown[key] < 120) return;
  obsCooldown[key] = now;

  o.glow = 1;
  b.glow = 1;
  const types = ['sine', 'triangle', 'sine'];
  playNote(NOTES[o.noteIdx], types[Math.floor(Math.random() * types.length)], 0.18);
  spawnImpact(b.x, b.y, o.hue);
}

// ─── UI ───────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', () => {
  if (balls.length < 6) balls.push(makeBall(balls.length));
});

document.getElementById('btn-trails').addEventListener('click', function() {
  showTrails = !showTrails;
  this.classList.toggle('active', showTrails);
});

document.getElementById('btn-ripples').addEventListener('click', function() {
  showRipples = !showRipples;
  this.classList.toggle('active', showRipples);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  balls = [makeBall(0)];
  particles = []; ripples = [];
  buildObstacles();
  obsCooldown = {}; wallCooldown = {};
});

// Click to add/remove obstacle
canvas.addEventListener('click', (e) => {
  if (!audioCtx) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Check if clicking existing obstacle
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    const dx = mx - o.x, dy = my - o.y;
    if (Math.sqrt(dx*dx + dy*dy) < o.r + 8) {
      obstacles.splice(i, 1);
      return;
    }
  }
  // Add new
  const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  const noteIdx = Math.floor(Math.random() * NOTES.length);
  obstacles.push({
    x: mx, y: my,
    r: 18 + Math.random() * 22,
    type, noteIdx,
    hue: Math.random() * 360,
    glow: 0.8,
    pulsePhase: 0,
  });
  playNote(NOTES[noteIdx], 'sine', 0.12);
  spawnImpact(mx, my, Math.random() * 360);
});

// Start overlay
document.getElementById('start-btn').addEventListener('click', () => {
  ensureAudio();
  const overlay = document.getElementById('start-overlay');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 900);
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
